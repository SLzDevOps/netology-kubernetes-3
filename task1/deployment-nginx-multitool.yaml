apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-multitool-deployment
  labels:
    app: nginx-multitool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-multitool
  template:
    metadata:
      labels:
        app: nginx-multitool
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
      - name: multitool
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache curl nslookup
          while true; do sleep 3600; done
        ports:
        - containerPort: 1180
        env:
        - name: HTTP_PORT
          value: "1180"
